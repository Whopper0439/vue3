<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script type="module">
      // 标准vue中实现了：
      // import {
      //   ref,
      //   effect,
      // } from '../../../../node_modules/vue/dist/vue.esm-browser.prod.js'
      import { ref, effect } from '../../dist/reactivity.esm.js'
      // console.log(ref, effect)

      const count = ref(0)

      // 问题：scheduler调度器，fn收集依赖，不让fn响应，触发后执行scheduler
      // 返回值e -> run()函数
      const runner = effect(
        () => {
          console.log('effect count.value => ', count.value)
          return 1
        },
        {
          scheduler() {
            // 调度器中也能触发fn,runner方法的返回值就是fn的返回值
            const newValue = runner()
            console.log('触发了调度器', newValue)
          },
        },
      )
      console.dir(runner)

      setTimeout(() => {
        count.value = 1
      }, 1000)
    </script>
  </head>
  <body></body>
</html>
