<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
    <style>
      body {
        padding: 150px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      // import {
      //   reactive,
      //   effect,
      //   ref,
      //   toRef,
      // } from '../../../../node_modules/vue/dist/vue.esm-browser.js'
      import {
        reactive,
        effect,
        ref,
        toRef,
      } from '../../dist/reactivity.esm.js'

      /**
       * 1. toRef
       * 2. toRefs
       * 3. unref
       * 4. proxyRefs
       */

      const state = reactive({
        name: '张三',
        age: 18,
      })

      // let { name } = toRefs(state)
      let name = toRef(state, 'name')
      console.log('name ==> ', name)
      effect(() => {
        console.log(state.name)
      })

      setTimeout(() => {
        name.value = '远方'
      }, 1000)
    </script>
  </body>
</html>
