<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
    <style>
      body {
        padding: 150px;
      }
      #app,
      #dv {
        width: 100px;
        height: 100px;
        background: red;
      }
      #dv {
        background: #000;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="dv"></div>
    <button id="btn">按钮</button>
    <script type="module">
      // import {
      //   ref,
      //   reactive,
      //   watch,
      // } from '../../../../node_modules/vue/dist/vue.esm-browser.prod.js'
      import { ref, reactive, watch } from '../../dist/reactivity.esm.js'

      const flag = ref(true)
      watch(
        flag,
        (newValue, oldValue, onCleanup) => {
          const dom = newValue ? app : dv
          function handler() {
            console.log(newValue ? '点击了app' : '点击了dv')
          }

          dom.addEventListener('click', handler)

          onCleanup(() => {
            dom.removeEventListener('click', handler)
          })

          // if (newValue) {
          //   app.onclick = () => {
          //     console.log('点击了app')
          //   }
          // } else {
          //   dv.onclick = () => {
          //     console.log('点击了dv')
          //   }
          // }
        },
        {
          // deep: 3,
          // once: true,
          immediate: true,
        },
      )

      btn.onclick = () => {
        flag.value = !flag.value
      }
    </script>
  </body>
</html>
