      import { ref, reactive, watch } from '../../dist/reactivity.esm.js'

      const state = reactive({
        a: {
          b: 1,
          c: {
            d: 1,
          },
        },
      })

      // ref: () => state.value
      // reactive: () => state
      watch(
        () => state,
        (newValue, oldValue) => {
          console.log('newValue,oldValue =>', newValue, oldValue)
        },
        {
          deep: 3,
          // once: true,
          // immediate: true
        },
      )

      setTimeout(() => {
        // state.a.b = 2
        state.a.c.d = 2 // reactive
        // state.value.a.c.d = 2  // ref
      }, 1000)

      // setTimeout(() => {
